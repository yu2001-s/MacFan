name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos:
    name: macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package
        env:
          MACFAN_CODESIGN_IDENTITY: "-"
        run: ./script/package_release.sh

      - name: Upload app zip
        uses: actions/upload-artifact@v4
        with:
          name: MacFan-macos
          path: |
            artifacts/MacFan-*-macos.zip
            artifacts/MacFan-*-macos.zip.sha256
